<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Kilo Aurora Chess</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Modern vanilla JS chess vs computer with 6 difficulty levels." />

  <!-- Vanduo Framework CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/vanduo-oss/framework@v1.3.2/dist/vanduo.min.css" />

  <!-- Phosphor Icons (Duotone) -->
  <link rel="stylesheet" href="dist/icons/phosphor/duotone/style.css" />

  <!-- Custom theme (after Vanduo for overrides) -->
  <link rel="stylesheet" href="styles/theme.css" />
  <link rel="stylesheet" href="styles/layout.css" />

  <link rel="icon" href="favicon.svg" type="image/svg+xml">
</head>

<body>
  <div id="app-root">
    <header class="app-header glass-panel">
      <div class="vd-container-lg vd-d-flex items-center justify-between">
        <h1 class="app-title">
          <i class="ph-duotone ph-chess-piece app-title-icon" aria-hidden="true"></i>
          <span class="app-title-text">Kilo Aurora Chess</span>
          <i class="ph-duotone ph-brain thinking-icon" aria-hidden="true"></i>
        </h1>
        <div class="header-right-section">
          <div class="header-controls vd-d-flex items-center vd-gap-4">
            <button id="theme-toggle-btn" class="vd-theme-customizer-trigger" aria-label="Toggle theme">
              <i class="ph-duotone ph-desktop"></i>
            </button>
            <button class="vd-theme-customizer-trigger" data-theme-customizer-trigger aria-label="Open theme customizer" aria-expanded="false">
              <i class="ph-duotone ph-paint-roller"></i>
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class="app-main vd-container-lg">
      <div class="vd-row">
        <section class="vd-col-12 vd-col-lg-8 board-section" aria-label="Chess board">
          <div id="board-container" class="vd-card-elevated"></div>
        </section>

        <aside class="vd-col-12 vd-col-lg-4" aria-label="Game controls and status">
          <div class="vd-card vd-card-elevated side-panel glass-panel">
            <section class="vd-card-body controls-section">
              <div class="new-game-action">
                <button id="new-game-btn" class="vd-btn vd-btn-primary" type="button">New Game</button>
              </div>

              <h2 class="vd-text-gradient">Game Settings</h2>

              <div class="vd-form-group">
                <label class="vd-form-label">Play as:</label>
                <div class="vd-btn-group" id="color-choice">
                  <button data-color="white" class="vd-btn vd-btn-outline vd-btn-sm">White</button>
                  <button data-color="black" class="vd-btn vd-btn-outline vd-btn-sm">Black</button>
                  <button data-color="random" class="vd-btn vd-btn-outline vd-btn-sm vd-is-active">Random</button>
                </div>
              </div>

              <div class="vd-form-group">
                <div class="vd-form-label" id="difficulty-label">Computer strength:</div>
                <div class="vd-btn-group" id="difficulty-choice" role="group" aria-labelledby="difficulty-label" aria-describedby="difficulty-desc">
                  <button data-level="1" class="vd-btn vd-btn-outline vd-btn-sm" title="Very Easy">1</button>
                  <button data-level="2" class="vd-btn vd-btn-outline vd-btn-sm" title="Easy">2</button>
                  <button data-level="3" class="vd-btn vd-btn-outline vd-btn-sm" title="Medium">3</button>
                  <button data-level="4" class="vd-btn vd-btn-outline vd-btn-sm" title="Hard">4</button>
                  <button data-level="5" class="vd-btn vd-btn-outline vd-btn-sm" title="Very Hard">5</button>
                  <button data-level="6" class="vd-btn vd-btn-outline vd-btn-sm vd-is-active" title="Expert">6</button>
                </div>
                <span id="difficulty-desc" class="vd-sr-only">Select AI difficulty level from 1 (easiest) to 6 (expert)</span>
              </div>

              <div class="vd-form-group">
                <div class="vd-form-label" id="thinking-label">Maximum Thinking Time:</div>
                <div class="vd-btn-group" id="thinking-choice" role="group" aria-labelledby="thinking-label">
                  <button data-time="5" class="vd-btn vd-btn-outline vd-btn-sm">5s</button>
                  <button data-time="10" class="vd-btn vd-btn-outline vd-btn-sm">10s</button>
                  <button data-time="20" class="vd-btn vd-btn-outline vd-btn-sm">20s</button>
                  <button data-time="30" class="vd-btn vd-btn-outline vd-btn-sm vd-is-active">30s</button>
                  <button data-time="60" class="vd-btn vd-btn-outline vd-btn-sm">60s</button>
                </div>
              </div>
            </section>

            <section class="vd-card-footer">
              <div class="status-bar">
                <div id="status-text" class="status-text" role="status" aria-live="polite">
                  Ready. Select settings and click 'New Game' to start.
                </div>
                <div class="status-hint" aria-hidden="true">
                  <i class="ph-duotone ph-chess-board"></i>
                </div>
              </div>
            </section>

            <section class="vd-card-body status-section">
              <h2 class="vd-text-gradient">Status</h2>
              <div id="turn-indicator" class="status-sub"></div>
              <div id="last-move-indicator" class="status-sub"></div>
            </section>

            <section class="vd-card-body history-section" aria-label="Move history">
              <h2 class="vd-text-gradient">Move History</h2>
              <ol id="move-history" class="move-history-list"></ol>
            </section>

            <div class="side-panel-footer">
              <div class="side-panel-version-wrap">
                <span class="app-version" aria-label="Version 2.0.6">v2.0.6</span>
              </div>
              <p class="side-panel-attribution">
                <a href="https://vanduo.dev/" target="_blank" rel="noopener noreferrer">Powered by Vanduo Framework</a>
              </p>
            </div>
          </div>
        </aside>
      </div>
    </main>

    <div id="game-end-modal-container"></div>
    <div id="disclaimer-modal-container"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/vanduo-oss/framework@v1.3.2/dist/vanduo.min.js"></script>
  <script type="module" src="js/main.js"></script>
</body>

</html>
