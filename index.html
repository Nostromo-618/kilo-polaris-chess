<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Kilo Polaris Chess</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Modern vanilla JS chess vs computer with 5 difficulty levels." />

  <!-- Vanduo Framework CSS -->
  <link rel="stylesheet" href="dist/vanduo.min.css" />

  <!-- Phosphor Icons (Duotone) -->
  <link rel="stylesheet" href="dist/icons/phosphor/duotone/style.css" />

  <!-- Custom theme (after Vanduo for overrides) -->
  <link rel="stylesheet" href="styles/theme.css" />
  <link rel="stylesheet" href="styles/layout.css" />

  <link rel="icon" href="favicon.svg" type="image/svg+xml">

  <!-- Vanduo Framework JS -->
  <script src="dist/vanduo.min.js"></script>
</head>

<body>
  <div id="app-root">
    <header class="app-header glass-panel">
      <div class="vd-container-lg vd-d-flex items-center justify-between">
        <h1 class="app-title">
          <i class="ph-duotone ph-chess-piece app-title-icon" aria-hidden="true"></i>
          <span class="app-title-text">Kilo Polaris Chess</span>
          <span class="app-version" aria-label="Version 2.0.2">v2.0.2</span>
        </h1>
        <div class="vd-d-flex items-center vd-gap-4">
          <button id="theme-toggle-btn" class="vd-theme-customizer-trigger" aria-label="Toggle theme">
            <i class="ph-duotone ph-desktop"></i>
          </button>
          <button class="vd-theme-customizer-trigger" data-theme-customizer-trigger aria-label="Open theme customizer" aria-expanded="false">
            <i class="ph-duotone ph-paint-roller"></i>
          </button>
        </div>
      </div>
    </header>

    <main class="app-main vd-container-lg">
      <div class="vd-row">
        <section class="vd-col-12 vd-col-lg-8 board-section" aria-label="Chess board">
          <div id="board-container" class="vd-card-elevated"></div>
        </section>

        <aside class="vd-col-12 vd-col-lg-4" aria-label="Game controls and status">
          <div class="vd-card vd-card-elevated side-panel glass-panel">
            <section class="vd-card-body controls-section">
              <h2 class="vd-text-gradient">Game Settings</h2>

              <div class="vd-form-group">
                <label class="vd-form-label">Play as:</label>
                <div class="vd-btn-group" id="color-choice">
                  <button data-color="white" class="vd-btn vd-btn-outline vd-btn-sm vd-is-active">White</button>
                  <button data-color="black" class="vd-btn vd-btn-outline vd-btn-sm">Black</button>
                  <button data-color="random" class="vd-btn vd-btn-outline vd-btn-sm">Random</button>
                </div>
              </div>

              <div class="vd-form-group">
                <label class="vd-form-label" for="difficulty-select">Computer strength:</label>
                <select id="difficulty-select" class="vd-form-select" aria-describedby="difficulty-desc">
                  <option value="1">Very Easy</option>
                  <option value="2">Easy</option>
                  <option value="3" selected>Medium</option>
                  <option value="4">Hard</option>
                  <option value="5">Very Hard</option>
                </select>
                <div class="vd-btn-group" id="difficulty-choice" role="group" aria-label="Or select with buttons">
                  <button data-level="1" class="vd-btn vd-btn-outline vd-btn-sm" title="Very Easy">1</button>
                  <button data-level="2" class="vd-btn vd-btn-outline vd-btn-sm" title="Easy">2</button>
                  <button data-level="3" class="vd-btn vd-btn-outline vd-btn-sm vd-is-active" title="Medium">3</button>
                  <button data-level="4" class="vd-btn vd-btn-outline vd-btn-sm" title="Hard">4</button>
                  <button data-level="5" class="vd-btn vd-btn-outline vd-btn-sm" title="Very Hard">5</button>
                </div>
                <span id="difficulty-desc" class="vd-sr-only">Select AI difficulty level from 1 (easiest) to 5 (hardest)</span>
              </div>

              <div class="vd-form-group">
                <label class="vd-form-label" for="thinking-time">Maximum Thinking Time:</label>
                <input type="number" id="thinking-time" class="vd-form-input" min="1" max="60" value="10" aria-describedby="thinking-desc" />
                <div class="vd-btn-group" id="thinking-choice" role="group" aria-label="Or select preset times">
                  <button data-time="5" class="vd-btn vd-btn-outline vd-btn-sm">5s</button>
                  <button data-time="10" class="vd-btn vd-btn-outline vd-btn-sm vd-is-active">10s</button>
                  <button data-time="15" class="vd-btn vd-btn-outline vd-btn-sm">15s</button>
                  <button data-time="30" class="vd-btn vd-btn-outline vd-btn-sm">30s</button>
                  <button data-time="60" class="vd-btn vd-btn-outline vd-btn-sm">60s</button>
                </div>
                <span id="thinking-desc" class="vd-sr-only">Maximum thinking time in seconds (1-60)</span>
              </div>

              <div class="vd-form-group board-size-control-desktop">
                <label class="vd-form-label" for="board-size-range">
                  Board size: <span id="board-size-value">704</span> px
                </label>
                <input type="range" id="board-size-range" class="range" min="0" max="100" value="80" aria-valuemin="0" aria-valuemax="100" aria-label="Board size" />
              </div>

              <div class="vd-form-group vd-mt-5">
                <button id="new-game-btn" class="vd-btn vd-btn-primary vd-btn-block vd-shadow-lg" aria-label="Start new game">
                  <i class="ph-duotone ph-play vd-mr-2"></i> New Game
                </button>
              </div>

              <div class="vd-form-group">
                <button id="undo-btn" class="vd-btn vd-btn-secondary vd-btn-block" disabled>
                  <i class="ph-duotone ph-arrow-counter-clockwise vd-mr-2"></i> Undo
                </button>
              </div>
            </section>

            <section class="vd-card-body status-section">
              <h2 class="vd-text-gradient">Status</h2>
              <div id="status-text" class="status-text" role="status" aria-live="polite">
                Initialize a new game to start.
              </div>
              <div id="turn-indicator" class="status-sub"></div>
              <div id="last-move-indicator" class="status-sub"></div>
            </section>

            <section class="vd-card-body history-section" aria-label="Move history">
              <h2 class="vd-text-gradient">Move History</h2>
              <ol id="move-history" class="move-history-list"></ol>
            </section>

            <p class="side-panel-attribution">
              <a href="https://github.com/vanduo-oss/framework" target="_blank" rel="noopener noreferrer">Powered by Vanduo Framework</a>
            </p>
          </div>
        </aside>
      </div>
    </main>
  </div>

  <!-- Disclaimer Modal Container (first-visit, mandatory) -->
  <div id="disclaimer-modal-container"></div>

  <!-- Game End Modal Container -->
  <div id="game-end-modal-container"></div>

  <!-- App defaults for Vanduo Theme Customizer (only when no saved prefs yet) -->
  <script>
    (function () {
      var keys = [
        'vanduo-primary-color',
        'vanduo-neutral-color',
        'vanduo-radius',
        'vanduo-font-preference'
      ];
      function allMissing() {
        try {
          return keys.every(function (k) { return localStorage.getItem(k) === null; });
        } catch {
          return false;
        }
      }
      if (allMissing()) {
        try {
          localStorage.setItem('vanduo-primary-color', 'amber');
          localStorage.setItem('vanduo-neutral-color', 'stone');
          localStorage.setItem('vanduo-radius', '0.375');
          localStorage.setItem('vanduo-font-preference', 'ubuntu');
        } catch { /* private mode / quota */ }
      }
    })();
  </script>
  <!-- Initialize Vanduo Framework (required in v1.1.0+) -->
  <script>Vanduo.init();</script>
  <script type="module" src="js/main.js"></script>
</body>

</html>
